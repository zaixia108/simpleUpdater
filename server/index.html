<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Updater 管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">
    <nav class="bg-blue-600 p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-white text-2xl font-bold">Simple Updater 管理后台</h1>
            <div id="status" class="text-white text-sm"></div>
        </div>
    </nav>

    <div class="container mx-auto mt-8 p-4">
        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">添加/修改应用记录</h2>
            <form id="recordForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">应用名称 (AppName)</label>
                    <input type="text" id="appName" name="appName" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">最新版本 (LatestVersion)</label>
                    <input type="number" id="appLatestVersion" name="appLatestVersion" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">强制更新最低版本 (MinVersion)</label>
                    <input type="number" id="appForceUpdateMiniumVersion" name="appForceUpdateMiniumVersion" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">可用版本 (用英文逗号隔开)</label>
                    <input type="text" id="appAvailableVersion" name="appAvailableVersion" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="1,2,3">
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">直链地址 (DirectLink)</label>
                    <input type="text" id="directLink" name="directLink" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">非直链地址 (NoneDirectLink)</label>
                    <input type="text" id="noneDirectLink" name="noneDirectLink" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-gray-700 text-sm font-bold mb-2">更新公告 (Notice)</label>
                    <textarea id="notice" name="notice" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" rows="3"></textarea>
                </div>
                <div class="md:col-span-2 flex justify-end gap-2">
                    <button type="button" onclick="clearForm()" class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline transition">清空</button>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-800 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline transition">保存/更新记录</button>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <div class="p-6 bg-gray-50 border-b flex justify-between items-center">
                <h2 class="text-xl font-semibold text-gray-800">应用记录列表</h2>
                <button onclick="loadRecords()" class="bg-green-600 hover:bg-green-700 text-white text-sm font-bold py-2 px-4 rounded transition">刷新列表</button>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full leading-normal">
                    <thead>
                        <tr>
                            <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">应用名</th>
                            <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">最新版本</th>
                            <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">强制更新</th>
                            <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">可用版本</th>
                            <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">操作</th>
                        </tr>
                    </thead>
                    <tbody id="recordsTable">
                        <!-- 动态加载内容 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function loadRecords() {
            try {
                const res = await fetch('/api/v1/list');
                const result = await res.json();
                const table = document.getElementById('recordsTable');
                table.innerHTML = '';

                if (result.data) {
                    result.data.forEach(record => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                                <p class="text-gray-900 whitespace-no-wrap">${record.appName}</p>
                            </td>
                            <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                                <p class="text-gray-900 whitespace-no-wrap">${record.appLatestVersion}</p>
                            </td>
                            <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                                <p class="text-gray-900 whitespace-no-wrap">${record.appForceUpdateMiniumVersion}</p>
                            </td>
                            <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                                <span class="break-words">${record.appAvailableVersion ? record.appAvailableVersion.join(', ') : ''}</span>
                            </td>
                            <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                                <div class="flex gap-2">
                                    <button onclick='editRecord(${JSON.stringify(record)})' class="bg-blue-100 text-blue-600 hover:bg-blue-200 px-3 py-1 rounded transition text-xs">编辑</button>
                                    <button onclick="deleteRecord('${record.appName}')" class="bg-red-100 text-red-600 hover:bg-red-200 px-3 py-1 rounded transition text-xs">删除</button>
                                </div>
                            </td>
                        `;
                        table.appendChild(row);
                    });
                }
                showStatus('加载成功', 'green');
            } catch (e) {
                showStatus('加载失败: ' + e.message, 'red');
            }
        }

        function editRecord(record) {
            document.getElementById('appName').value = record.appName;
            document.getElementById('appLatestVersion').value = record.appLatestVersion;
            document.getElementById('appForceUpdateMiniumVersion').value = record.appForceUpdateMiniumVersion;
            document.getElementById('appAvailableVersion').value = record.appAvailableVersion.join(',');
            document.getElementById('directLink').value = record.directLink;
            document.getElementById('noneDirectLink').value = record.noneDirectLink;
            document.getElementById('notice').value = record.notice;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteRecord(appName) {
            if (!confirm('确定要删除应用 ' + appName + ' 吗?')) return;
            try {
                const res = await fetch('/api/v1/remove/' + encodeURIComponent(appName), { method: 'POST' });
                const result = await res.json();
                if (res.ok) {
                    showStatus('删除成功', 'green');
                    loadRecords();
                } else {
                    showStatus('操作失败: ' + result.message, 'red');
                }
            } catch (e) {
                showStatus('请求错误: ' + e.message, 'red');
            }
        }

        function clearForm() {
            document.getElementById('recordForm').reset();
        }

        document.getElementById('recordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {
                appName: formData.get('appName'),
                appLatestVersion: parseInt(formData.get('appLatestVersion')),
                appForceUpdateMiniumVersion: parseInt(formData.get('appForceUpdateMiniumVersion')),
                appAvailableVersion: formData.get('appAvailableVersion').split(',').map(v => parseInt(v.trim())).filter(v => !isNaN(v)),
                directLink: formData.get('directLink'),
                noneDirectLink: formData.get('noneDirectLink'),
                notice: formData.get('notice')
            };

            try {
                // 简单起见，这里总是使用 overwrite
                const res = await fetch('/api/v1/update/overwrite', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                let result = await res.json();

                // 如果更新失败（可能不存在），尝试添加
                if (!res.ok) {
                    const addRes = await fetch('/api/v1/add', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    result = await addRes.json();
                    if (addRes.ok) {
                        showStatus('记录添加成功', 'green');
                        loadRecords();
                        clearForm();
                    } else {
                        showStatus('操作失败: ' + result.message, 'red');
                    }
                } else {
                    showStatus('记录更新成功', 'green');
                    loadRecords();
                    clearForm();
                }
            } catch (e) {
                showStatus('网络错误: ' + e.message, 'red');
            }
        });

        function showStatus(msg, color) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = msg;
            statusDiv.className = "text-white text-sm font-medium px-3 py-1 rounded bg-" + (color === 'green' ? 'green-500' : 'red-500');
            setTimeout(() => {
                statusDiv.className = "text-white text-sm";
                statusDiv.textContent = "";
            }, 3000);
        }

        loadRecords();
    </script>
</body>
</html>
